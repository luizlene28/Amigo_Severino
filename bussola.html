<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bússola 3D Premium</title>
    <style>
        :root {
            --bg: #06080f;
            --gold: #d4a960;
            --gold-light: #f0d78c;
            --accent: #3b7ddd;
            --danger: #e05555;
            --text: #e8e8f0;
            --text-secondary: #a0a4b8;
            --glass-bg: rgba(10, 14, 24, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow-lg: 0 25px 60px rgba(0, 0, 0, 0.55);
            --radius-xl: 28px;
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --font-display: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
            --transition-smooth: 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: var(--font-display);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
            -webkit-user-select: none;
            position: relative;
        }

        /* Canvas principal ocupa todo o fundo */
        #main-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            display: block;
        }

        /* === CONTAINER DO CUBO 3D (TOPO ESQUERDO) === */
        #cube-container {
            position: fixed;
            top: 18px;
            left: 18px;
            width: 62px;
            height: 62px;
            z-index: 20;
            pointer-events: none;
            filter: drop-shadow(0 8px 18px rgba(0, 0, 0, 0.5));
            transition: all var(--transition-smooth);
        }
        #cube-container canvas {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: var(--radius-md);
        }
        /* Brilho decorativo atrás do cubo */
        #cube-container::before {
            content: '';
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 169, 96, 0.25) 0%, transparent 70%);
            z-index: -1;
            animation: cubeGlowPulse 3s ease-in-out infinite;
        }
        @keyframes cubeGlowPulse {
            0%,
            100% {
                opacity: 0.5;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.25);
            }
        }

        /* === OVERLAY UI === */
        #ui-overlay {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px 20px 12px;
        }

        /* Título superior central */
        .header-title {
            text-align: center;
            pointer-events: none;
        }
        .header-title .app-name {
            display: inline-block;
            font-size: clamp(18px, 3.5vw, 22px);
            font-weight: 700;
            letter-spacing: 0.04em;
            color: #ffffff;
            text-shadow: 0 0 30px rgba(180, 200, 255, 0.5);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 10px 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .header-title .app-name .icon-compass {
            display: inline-block;
            animation: gentlePulse 2.5s ease-in-out infinite;
            font-size: 1.3em;
            vertical-align: -3px;
            margin-right: 2px;
        }
        @keyframes gentlePulse {
            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 6px rgba(255, 200, 100, 0.6));
            }
            50% {
                transform: scale(1.18);
                filter: drop-shadow(0 0 16px rgba(255, 180, 60, 0.9));
            }
        }

        /* Indicador de heading */
        #heading-display {
            text-align: center;
            pointer-events: none;
            margin-top: auto;
            margin-bottom: 70px;
        }
        #heading-display .heading-card {
            display: inline-block;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 14px 28px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: var(--shadow-lg);
        }
        #heading-display .direction-label {
            font-size: clamp(26px, 5vw, 34px);
            font-weight: 800;
            letter-spacing: 0.03em;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }
        #heading-display .degrees-label {
            font-size: clamp(14px, 2.5vw, 17px);
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.05em;
            margin-top: 2px;
        }
        #heading-display .highlight-north {
            color: #ff5555;
            text-shadow: 0 0 18px rgba(255, 80, 80, 0.7);
        }

        /* Botão de sensores */
        #sensor-btn-wrapper {
            text-align: center;
            pointer-events: auto;
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 25;
        }
        #permission-btn {
            background: linear-gradient(135deg, #1a1e2e 0%, #252b3d 100%);
            color: #d4d8e8;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            padding: 13px 30px;
            border-radius: 40px;
            font-size: clamp(14px, 2.8vw, 16px);
            font-weight: 600;
            letter-spacing: 0.03em;
            cursor: pointer;
            transition: all var(--transition-smooth);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            white-space: nowrap;
            font-family: var(--font-display);
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        #permission-btn:active {
            transform: scale(0.94);
            background: linear-gradient(135deg, #2a3048 0%, #353e55 100%);
            border-color: var(--gold);
            box-shadow: 0 4px 16px rgba(212, 169, 96, 0.5);
        }
        #permission-btn.active-state {
            background: linear-gradient(135deg, #1a3a1a 0%, #1f4428 100%);
            border-color: #4caf84;
            color: #c8f0d8;
            pointer-events: none;
            animation: activeGlow 2s ease-in-out infinite;
        }
        @keyframes activeGlow {
            0%,
            100% {
                box-shadow: 0 0 20px rgba(76, 175, 132, 0.3);
            }
            50% {
                box-shadow: 0 0 40px rgba(76, 175, 132, 0.7);
            }
        }
        #permission-btn.disabled-state {
            background: #1a1a1a;
            border-color: #444;
            color: #777;
            pointer-events: none;
            cursor: not-allowed;
        }

        /* === AVISO DE PRECISÃO (RODAPÉ) === */
        #precision-warning {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            pointer-events: none;
            text-align: center;
            max-width: 90vw;
        }
        #precision-warning span {
            font-size: clamp(9px, 1.6vw, 10.5px);
            color: rgba(180, 185, 200, 0.55);
            letter-spacing: 0.03em;
            font-weight: 400;
            line-height: 1.35;
            font-family: var(--font-display);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
        }
        #precision-warning .warn-icon {
            display: inline-block;
            margin-right: 3px;
            font-size: 1.1em;
            vertical-align: -1px;
        }

        /* === RESPONSIVIDADE === */
        @media (max-width: 600px) {
            #cube-container {
                top: 10px;
                left: 10px;
                width: 46px;
                height: 46px;
            }
            #ui-overlay {
                padding: 12px 10px 8px;
            }
            .header-title .app-name {
                padding: 8px 18px;
                font-size: 16px;
                border-radius: 30px;
            }
            #heading-display .heading-card {
                padding: 10px 20px;
                border-radius: var(--radius-lg);
            }
            #heading-display .direction-label {
                font-size: 24px;
            }
            #sensor-btn-wrapper {
                bottom: 80px;
            }
            #permission-btn {
                padding: 11px 24px;
                font-size: 14px;
                border-radius: 30px;
            }
            #precision-warning span {
                font-size: 9px;
            }
        }
        @media (min-width: 1200px) {
            #cube-container {
                top: 24px;
                left: 24px;
                width: 72px;
                height: 72px;
            }
            #heading-display .direction-label {
                font-size: 38px;
            }
            #permission-btn {
                padding: 15px 36px;
                font-size: 17px;
            }
        }
        @media (max-height: 700px) {
            #sensor-btn-wrapper {
                bottom: 65px;
            }
            #heading-display {
                margin-bottom: 40px;
            }
            #precision-warning {
                bottom: 6px;
            }
        }
    </style>
</head>
<body>

    <!-- Canvas principal da cena 3D -->
    <canvas id="main-canvas"></canvas>

    <!-- Mini cubo 3D no topo esquerdo -->
    <div id="cube-container">
        <canvas id="cube-canvas"></canvas>
    </div>

    <!-- Overlay UI -->
    <div id="ui-overlay">
        <div class="header-title">
            <span class="app-name">
                <span class="icon-compass">🧭</span> BÚSSOLA 3D
            </span>
        </div>
        <div id="heading-display">
            <div class="heading-card">
                <div class="direction-label" id="direction-text">N • <span class="highlight-north">NORTE</span></div>
                <div class="degrees-label" id="degrees-text">0°</div>
            </div>
        </div>
    </div>

    <!-- Botão de sensores -->
    <div id="sensor-btn-wrapper">
        <button id="permission-btn" aria-label="Ativar sensores de orientação">📡 ATIVAR SENSORES</button>
    </div>

    <!-- Aviso de precisão -->
    <div id="precision-warning">
        <span><span class="warn-icon">⚠️</span> A bússola digital possui precisão limitada e não substitui uma bússola convencional. Utilize apenas como referência.</span>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    <script>
        (function() {
            // ============ VERIFICAÇÃO THREE.JS ============
            if (typeof THREE === 'undefined') {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
                script.onerror = () => {
                    document.body.innerHTML =
                        '<div style="color:#fff;text-align:center;padding:40px;font-family:sans-serif;"><h2>Erro ao carregar Three.js</h2><p>Verifique sua conexão com a internet.</p></div>';
                };
                document.head.appendChild(script);
                throw new Error('Three.js não carregado - aguardando fallback');
            }

            // ============ REFERÊNCIAS DOM ============
            const mainCanvas = document.getElementById('main-canvas');
            const cubeCanvas = document.getElementById('cube-canvas');
            const directionText = document.getElementById('direction-text');
            const degreesText = document.getElementById('degrees-text');
            const permissionBtn = document.getElementById('permission-btn');
            const cubeContainer = document.getElementById('cube-container');

            // ============ RENDERER PRINCIPAL ============
            const renderer = new THREE.WebGLRenderer({ canvas: mainCanvas, antialias: true, alpha: false });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.1;
            renderer.outputEncoding = THREE.sRGBEncoding;

            // ============ CENA PRINCIPAL ============
            const scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x06080f, 0.00015);

            // Câmera
            const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 80);
            camera.position.set(0, 6.5, 11.5);
            camera.lookAt(0, 0.3, 0);

            // ============ ILUMINAÇÃO PROFISSIONAL ============
            const ambientLight = new THREE.AmbientLight(0x334466, 0.9);
            scene.add(ambientLight);

            const keyLight = new THREE.DirectionalLight(0xfffaf0, 1.3);
            keyLight.position.set(8, 14, 6);
            keyLight.castShadow = true;
            keyLight.shadow.mapSize.width = 2048;
            keyLight.shadow.mapSize.height = 2048;
            keyLight.shadow.camera.near = 0.5;
            keyLight.shadow.camera.far = 60;
            keyLight.shadow.camera.left = -15;
            keyLight.shadow.camera.right = 15;
            keyLight.shadow.camera.top = 15;
            keyLight.shadow.camera.bottom = -15;
            keyLight.shadow.bias = -0.0001;
            keyLight.shadow.normalBias = 0.02;
            scene.add(keyLight);

            const fillLight = new THREE.PointLight(0x5577cc, 0.7, 25);
            fillLight.position.set(-6, 2, -4);
            scene.add(fillLight);

            const rimLight = new THREE.PointLight(0xff9966, 0.55, 20);
            rimLight.position.set(0, -1.5, 7);
            scene.add(rimLight);

            const topLight = new THREE.PointLight(0xffffff, 0.4, 18);
            topLight.position.set(0, 10, 0);
            scene.add(topLight);

            // ============ GRUPO TERRA ============
            const earthGroup = new THREE.Group();
            scene.add(earthGroup);

            // Textura procedural da Terra
            function createEarthTexture() {
                const canvas = document.createElement('canvas');
                canvas.width = 1024;
                canvas.height = 512;
                const ctx = canvas.getContext('2d');

                // Gradiente oceânico
                const oceanGrad = ctx.createRadialGradient(512, 200, 50, 512, 256, 600);
                oceanGrad.addColorStop(0, '#1e6ec7');
                oceanGrad.addColorStop(0.5, '#1555a0');
                oceanGrad.addColorStop(1, '#0b3570');
                ctx.fillStyle = oceanGrad;
                ctx.fillRect(0, 0, 1024, 512);

                // Ruído sutil no oceano
                ctx.globalAlpha = 0.12;
                for (let i = 0; i < 2000; i++) {
                    const rx = Math.random() * 1024;
                    const ry = Math.random() * 512;
                    ctx.fillStyle = Math.random() > 0.5 ? '#3a90e0' : '#0c4080';
                    ctx.fillRect(rx, ry, 2, 2);
                }
                ctx.globalAlpha = 1;

                // Continentes
                const landColor = '#4a9e3f';
                const landDark = '#357a2b';
                ctx.fillStyle = landColor;
                ctx.strokeStyle = landDark;
                ctx.lineWidth = 2;

                function drawContinent(cx, cy, rx, ry, rotation = 0) {
                    ctx.save();
                    ctx.translate(cx, cy);
                    ctx.rotate(rotation);
                    ctx.beginPath();
                    ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    // Detalhes internos
                    ctx.fillStyle = landDark;
                    ctx.beginPath();
                    ctx.ellipse(rx * 0.25, ry * 0.2, rx * 0.35, ry * 0.3, 0.3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#5cb84d';
                    ctx.beginPath();
                    ctx.ellipse(-rx * 0.2, -ry * 0.15, rx * 0.25, ry * 0.25, -0.2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = landColor;
                    ctx.restore();
                }

                drawContinent(180, 130, 85, 115, 0.1); // América do Norte
                drawContinent(230, 290, 50, 85, 0.05); // América do Sul
                drawContinent(510, 140, 65, 72, 0); // Europa
                drawContinent(520, 275, 58, 105, -0.05); // África
                drawContinent(720, 155, 105, 95, 0.08); // Ásia
                drawContinent(790, 340, 32, 26, 0.15); // Austrália
                drawContinent(140, 350, 18, 35, 0.3); // Groenlândia (aproximada)

                // Nuvens atmosféricas
                ctx.globalAlpha = 0.2;
                ctx.fillStyle = '#ffffff';
                for (let i = 0; i < 300; i++) {
                    const cx = Math.random() * 1024;
                    const cy = Math.random() * 512;
                    ctx.beginPath();
                    ctx.ellipse(cx, cy, Math.random() * 30 + 8, Math.random() * 12 + 3, Math.random() * Math.PI, 0, Math
                        .PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;

                return new THREE.CanvasTexture(canvas);
            }

            const earthGeo = new THREE.SphereGeometry(3, 72, 72);
            const earthMat = new THREE.MeshStandardMaterial({
                map: createEarthTexture(),
                roughness: 0.55,
                metalness: 0.05,
                emissive: 0x112244,
                emissiveIntensity: 0.15,
            });
            const earth = new THREE.Mesh(earthGeo, earthMat);
            earth.position.y = -8;
            earth.castShadow = true;
            earth.receiveShadow = true;
            earthGroup.add(earth);

            // Anel atmosférico
            const atmoGeo = new THREE.TorusGeometry(3.08, 0.08, 32, 100);
            const atmoMat = new THREE.MeshStandardMaterial({
                color: 0x99ccff,
                emissive: 0x335577,
                emissiveIntensity: 0.5,
                transparent: true,
                opacity: 0.35,
                roughness: 0.4,
                metalness: 0.2,
            });
            const atmosphere = new THREE.Mesh(atmoGeo, atmoMat);
            atmosphere.position.y = -8;
            atmosphere.rotation.x = Math.PI / 2;
            earthGroup.add(atmosphere);

            // ============ BÚSSOLA PRINCIPAL ============
            const compassGroup = new THREE.Group();
            scene.add(compassGroup);

            // Base cilíndrica
            const baseGeo = new THREE.CylinderGeometry(4.2, 4.7, 0.55, 80);
            const baseMat = new THREE.MeshStandardMaterial({
                color: 0x1c1f2e,
                metalness: 0.85,
                roughness: 0.18,
                emissive: 0x0a0d18,
                emissiveIntensity: 0.4,
            });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.castShadow = true;
            base.receiveShadow = true;
            compassGroup.add(base);

            // Anel dourado externo
            const ringGeo = new THREE.TorusGeometry(4.55, 0.12, 24, 90);
            const ringMat = new THREE.MeshStandardMaterial({
                color: 0xe8c468,
                metalness: 0.95,
                roughness: 0.15,
                emissive: 0x332211,
                emissiveIntensity: 0.5,
            });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI / 2;
            ring.position.y = 0.3;
            compassGroup.add(ring);

            // Marcadores da rosa dos ventos
            for (let i = 0; i < 72; i++) {
                const angle = (i / 72) * Math.PI * 2;
                let length, color;
                if (i % 18 === 0) { length = 0.75;
                    color = 0xe8c468; } // Principais
                else if (i % 9 === 0) { length = 0.5;
                    color = 0xcccccc; } // Secundários
                else { length = 0.28;
                    color = 0x666677; } // Terciários

                const markerGeo = new THREE.BoxGeometry(0.06, 0.015, length);
                const markerMat = new THREE.MeshStandardMaterial({
                    color: color,
                    metalness: 0.7,
                    roughness: 0.35,
                    emissive: i % 18 === 0 ? 0x221100 : 0x000000,
                    emissiveIntensity: i % 18 === 0 ? 0.4 : 0,
                });
                const marker = new THREE.Mesh(markerGeo, markerMat);
                marker.position.x = Math.cos(angle) * 4.45;
                marker.position.z = Math.sin(angle) * 4.45;
                marker.position.y = 0.32;
                marker.rotation.y = -angle;
                marker.castShadow = true;
                compassGroup.add(marker);
            }

            // Função para criar labels 3D com sprites
            function createLabel(text, color, x, z, isMain = false) {
                const canvas = document.createElement('canvas');
                canvas.width = 256;
                canvas.height = 256;
                const ctx = canvas.getContext('2d');

                if (isMain) {
                    ctx.shadowColor = color;
                    ctx.shadowBlur = 35;
                    ctx.fillStyle = color;
                    ctx.font = 'bold 150px "Segoe UI", system-ui, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(text, 128, 128);
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 10;
                    ctx.strokeText(text, 128, 128);
                } else {
                    ctx.fillStyle = color;
                    ctx.font = 'bold 105px "Segoe UI", system-ui, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(text, 128, 128);
                    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
                    ctx.lineWidth = 5;
                    ctx.strokeText(text, 128, 128);
                }

                const texture = new THREE.CanvasTexture(canvas);
                texture.minFilter = THREE.LinearFilter;
                texture.magFilter = THREE.LinearFilter;
                const material = new THREE.SpriteMaterial({
                    map: texture,
                    blending: THREE.NormalBlending,
                    depthTest: false,
                    depthWrite: false,
                });
                const sprite = new THREE.Sprite(material);
                sprite.position.set(x, 1.45, z);
                sprite.scale.set(2.3, 2.3, 1);
                compassGroup.add(sprite);
                return sprite;
            }

            createLabel('N', '#ff3333', 0, -5.2, true);
            createLabel('S', '#33ccff', 0, 5.2, false);
            createLabel('L', '#33dd55', 5.2, 0, false);
            createLabel('O', '#ffbb33', -5.2, 0, false);
            createLabel('NE', '#ff8844', 3.5, -3.5, false);
            createLabel('NO', '#ff8844', -3.5, -3.5, false);
            createLabel('SE', '#4488ff', 3.5, 3.5, false);
            createLabel('SO', '#4488ff', -3.5, 3.5, false);

            // Ponteiro (agulha)
            const pointerGroup = new THREE.Group();
            compassGroup.add(pointerGroup);
            pointerGroup.position.y = 0.32;

            // Agulha vermelha (Norte)
            const redNeedleGeo = new THREE.BoxGeometry(0.35, 0.08, 3.3);
            const redNeedleMat = new THREE.MeshStandardMaterial({
                color: 0xee2222,
                metalness: 0.25,
                roughness: 0.35,
                emissive: 0x330000,
                emissiveIntensity: 0.7,
            });
            const redNeedle = new THREE.Mesh(redNeedleGeo, redNeedleMat);
            redNeedle.position.z = -1.65;
            redNeedle.castShadow = true;
            pointerGroup.add(redNeedle);

            // Agulha cinza (Sul)
            const grayNeedleGeo = new THREE.BoxGeometry(0.35, 0.08, 2.7);
            const grayNeedleMat = new THREE.MeshStandardMaterial({
                color: 0x555566,
                metalness: 0.5,
                roughness: 0.3,
            });
            const grayNeedle = new THREE.Mesh(grayNeedleGeo, grayNeedleMat);
            grayNeedle.position.z = 1.35;
            pointerGroup.add(grayNeedle);

            // Centro dourado
            const centerGeo = new THREE.SphereGeometry(0.28, 40, 40);
            const centerMat = new THREE.MeshStandardMaterial({
                color: 0xf0d060,
                metalness: 0.9,
                roughness: 0.08,
                emissive: 0x332200,
                emissiveIntensity: 0.6,
            });
            const centerSphere = new THREE.Mesh(centerGeo, centerMat);
            centerSphere.position.y = 0.04;
            centerSphere.castShadow = true;
            pointerGroup.add(centerSphere);

            // Cúpula de vidro
            const glassGeo = new THREE.SphereGeometry(2.4, 64, 64);
            const glassMat = new THREE.MeshPhysicalMaterial({
                color: 0xffffff,
                metalness: 0.05,
                roughness: 0.08,
                transparent: true,
                opacity: 0.28,
                clearcoat: 1.0,
                clearcoatRoughness: 0.08,
                envMapIntensity: 0.3,
            });
            const glass = new THREE.Mesh(glassGeo, glassMat);
            glass.position.y = 0.75;
            glass.castShadow = true;
            glass.receiveShadow = true;
            compassGroup.add(glass);

            // ============ NAVES ESPACIAIS (SPRITES) ============
            const spaceships = [];
            const shipEmojis = ['🚀', '🛸', '🛰️', '🛩️', '✈️', '🛸', '🚀', '🛰️', '🛸', '🚁'];

            function createSpaceship() {
                const canvas = document.createElement('canvas');
                canvas.width = 128;
                canvas.height = 128;
                const ctx = canvas.getContext('2d');
                const emoji = shipEmojis[Math.floor(Math.random() * shipEmojis.length)];
                ctx.font = '78px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(emoji, 64, 64);

                const texture = new THREE.CanvasTexture(canvas);
                texture.minFilter = THREE.LinearFilter;
                const material = new THREE.SpriteMaterial({
                    map: texture,
                    blending: THREE.AdditiveBlending,
                    depthTest: false,
                    depthWrite: false,
                    opacity: 0.85,
                });
                const sprite = new THREE.Sprite(material);
                sprite.position.set(
                    (Math.random() - 0.5) * 22,
                    (Math.random() - 0.5) * 16 - 3,
                    (Math.random() - 0.5) * 22
                );
                sprite.scale.set(1.4, 1.4, 1);
                sprite.userData = {
                    speed: Math.random() * 0.018 + 0.008,
                    rotationSpeed: Math.random() * 0.018 - 0.009,
                    orbitRadius: Math.random() * 6 + 7,
                    orbitSpeed: Math.random() * 0.004 + 0.0015,
                    angle: Math.random() * Math.PI * 2,
                    verticalSpeed: Math.random() * 0.008 - 0.004,
                };
                scene.add(sprite);
                return sprite;
            }

            for (let i = 0; i < 16; i++) {
                spaceships.push(createSpaceship());
            }

            // ============ PARTÍCULAS ESTELARES ============
            const starsGeo = new THREE.BufferGeometry();
            const starsCount = 600;
            const starsPositions = new Float32Array(starsCount * 3);
            const starsSizes = new Float32Array(starsCount);
            for (let i = 0; i < starsCount; i++) {
                starsPositions[i * 3] = (Math.random() - 0.5) * 35;
                starsPositions[i * 3 + 1] = (Math.random() - 0.5) * 28;
                starsPositions[i * 3 + 2] = (Math.random() - 0.5) * 30;
                starsSizes[i] = Math.random() * 0.06 + 0.015;
            }
            starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
            starsGeo.setAttribute('size', new THREE.BufferAttribute(starsSizes, 1));
            const starsMat = new THREE.PointsMaterial({
                size: 0.04,
                color: 0xffffff,
                blending: THREE.AdditiveBlending,
                transparent: true,
                opacity: 0.75,
                depthWrite: false,
            });
            const stars = new THREE.Points(starsGeo, starsMat);
            scene.add(stars);

            // ============ CUBO 3D DECORATIVO (TOPO ESQUERDO) ============
            const cubeScene = new THREE.Scene();
            const cubeCamera = new THREE.PerspectiveCamera(40, 1, 0.1, 20);
            cubeCamera.position.set(1.6, 1.2, 2.2);
            cubeCamera.lookAt(0, 0, 0);

            const cubeRenderer = new THREE.WebGLRenderer({ canvas: cubeCanvas, antialias: true, alpha: true });
            cubeRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            cubeRenderer.setSize(
                cubeContainer.clientWidth || 62,
                cubeContainer.clientHeight || 62
            );
            cubeRenderer.setClearColor(0x000000, 0);

            // Cubo principal
            const cubeGeo = new THREE.BoxGeometry(0.85, 0.85, 0.85);
            const cubeMat = new THREE.MeshPhysicalMaterial({
                color: 0xffffff,
                metalness: 0.3,
                roughness: 0.2,
                transparent: true,
                opacity: 0.55,
                clearcoat: 0.6,
                clearcoatRoughness: 0.1,
                envMapIntensity: 0.4,
            });
            const cubeMesh = new THREE.Mesh(cubeGeo, cubeMat);
            cubeScene.add(cubeMesh);

            // Wireframe dourado do cubo
            const wireGeo = new THREE.EdgesGeometry(cubeGeo);
            const wireMat = new THREE.LineBasicMaterial({
                color: 0xf0d060,
                linewidth: 1,
                transparent: true,
                opacity: 0.9,
            });
            const wireframe = new THREE.LineSegments(wireGeo, wireMat);
            cubeMesh.add(wireframe);

            // Partículas orbitando o cubo
            const orbitParticlesGeo = new THREE.BufferGeometry();
            const orbitCount = 30;
            const orbitPositionsArr = new Float32Array(orbitCount * 3);
            for (let i = 0; i < orbitCount; i++) {
                const theta = (i / orbitCount) * Math.PI * 2;
                const radius = 0.9 + Math.random() * 0.35;
                orbitPositionsArr[i * 3] = Math.cos(theta) * radius;
                orbitPositionsArr[i * 3 + 1] = Math.sin(theta) * radius * 0.7;
                orbitPositionsArr[i * 3 + 2] = Math.sin(theta) * radius * 0.5;
            }
            orbitParticlesGeo.setAttribute('position', new THREE.BufferAttribute(orbitPositionsArr, 3));
            const orbitParticlesMat = new THREE.PointsMaterial({
                size: 0.03,
                color: 0xf0d878,
                blending: THREE.AdditiveBlending,
                transparent: true,
                opacity: 0.8,
                depthWrite: false,
            });
            const orbitParticles = new THREE.Points(orbitParticlesGeo, orbitParticlesMat);
            cubeScene.add(orbitParticles);

            // Iluminação do cubo
            const cubeAmbient = new THREE.AmbientLight(0x444466, 1.2);
            cubeScene.add(cubeAmbient);
            const cubePointLight = new THREE.PointLight(0xffd8a0, 1.5, 8);
            cubePointLight.position.set(2, 3, 3);
            cubeScene.add(cubePointLight);
            const cubeFillLight = new THREE.PointLight(0x6699cc, 0.6, 6);
            cubeFillLight.position.set(-2, -1, -1);
            cubeScene.add(cubeFillLight);

            // ============ ESTADO DOS SENSORES ============
            let currentHeading = 0;
            let targetHeading = 0;
            let isSensorActive = false;
            let permissionRequested = false;

            // ============ FUNÇÕES DE SENSORES ============
            function updateHeadingDisplay(heading) {
                const directions = ['N', 'NE', 'L', 'SE', 'S', 'SO', 'O', 'NO'];
                const index = Math.round(heading / 45) % 8;
                const dir = directions[index];
                const degrees = Math.round(heading);

                if (dir === 'N') {
                    directionText.innerHTML = 'N • <span class="highlight-north">NORTE</span>';
                } else if (dir === 'S') {
                    directionText.innerHTML =
                    'S • <span style="color:#33ccff;text-shadow:0 0 14px rgba(51,204,255,0.6);">SUL</span>';
                } else if (dir === 'L') {
                    directionText.innerHTML =
                    'L • <span style="color:#33dd55;text-shadow:0 0 14px rgba(51,221,85,0.6);">LESTE</span>';
                } else if (dir === 'O') {
                    directionText.innerHTML =
                    'O • <span style="color:#ffbb33;text-shadow:0 0 14px rgba(255,187,51,0.6);">OESTE</span>';
                } else {
                    directionText.innerHTML = `${dir} • <span style="color:#ccc;">${['NORDESTE','NOROESTE','SUDESTE','SUDOESTE'][['NE','NO','SE','SO'].indexOf(dir)]}</span>`;
                }
                degreesText.textContent = `${degrees}°`;
            }

            function handleOrientation(event) {
                if (!isSensorActive) return;
                let heading;
                if (event.webkitCompassHeading !== undefined) {
                    heading = event.webkitCompassHeading;
                } else if (event.alpha !== null) {
                    heading = 360 - event.alpha;
                } else {
                    return;
                }
                while (heading < 0) heading += 360;
                while (heading >= 360) heading -= 360;
                targetHeading = heading;
                updateHeadingDisplay(heading);
            }

            async function requestSensorPermission() {
                if (permissionRequested) return;
                permissionRequested = true;

                try {
                    if (typeof DeviceOrientationEvent !== 'undefined') {
                        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                            const permission = await DeviceOrientationEvent.requestPermission();
                            if (permission === 'granted') {
                                startSensors();
                            } else {
                                showSensorFallback('Permissão negada.');
                            }
                        } else {
                            startSensors();
                        }
                    } else {
                        showSensorFallback('Sensores não suportados.');
                    }
                } catch (error) {
                    console.error('Erro ao solicitar permissão:', error);
                    showSensorFallback('Erro nos sensores.');
                }
            }

            function startSensors() {
                isSensorActive = true;
                permissionBtn.textContent = '✅ SENSORES ATIVOS';
                permissionBtn.classList.add('active-state');
                window.addEventListener('deviceorientation', handleOrientation);
                setTimeout(() => {
                    permissionBtn.style.opacity = '0';
                    permissionBtn.style.pointerEvents = 'none';
                    setTimeout(() => { permissionBtn.style.display = 'none'; }, 400);
                }, 2500);
            }

            function showSensorFallback(msg) {
                isSensorActive = false;
                permissionBtn.textContent = '📱 MODO DEMONSTRAÇÃO';
                permissionBtn.classList.add('disabled-state');
                permissionBtn.disabled = true;
                console.info('Fallback:', msg);
                setTimeout(() => {
                    permissionBtn.style.opacity = '0.5';
                }, 1000);
            }

            // ============ ANIMAÇÃO ============
            const clock = new THREE.Clock();
            let demoAngle = Math.random() * 360;

            function animate(timestamp) {
                requestAnimationFrame(animate);

                const dt = Math.min(clock.getDelta(), 0.1);

                // Rotação da Terra
                earth.rotation.y += 0.0015;
                atmosphere.rotation.z += 0.0008;

                // Movimento das naves
                spaceships.forEach(ship => {
                    ship.userData.angle += ship.userData.orbitSpeed;
                    ship.position.x = Math.cos(ship.userData.angle) * ship.userData.orbitRadius;
                    ship.position.z = Math.sin(ship.userData.angle) * ship.userData.orbitRadius;
                    ship.position.y += ship.userData.verticalSpeed;
                    if (ship.position.y > 13) ship.position.y = -13;
                    if (ship.position.y < -13) ship.position.y = 13;
                    ship.material.rotation += ship.userData.rotationSpeed;
                });

                // Estrelas
                stars.rotation.y += 0.00015;
                stars.rotation.x += 0.00008;

                // Bússola
                if (isSensorActive) {
                    const smoothingFactor = 0.12;
                    let delta = targetHeading - currentHeading;
                    if (delta > 180) delta -= 360;
                    if (delta < -180) delta += 360;
                    currentHeading += delta * smoothingFactor;
                    while (currentHeading < 0) currentHeading += 360;
                    while (currentHeading >= 360) currentHeading -= 360;
                    pointerGroup.rotation.y = THREE.MathUtils.degToRad(currentHeading);
                } else {
                    demoAngle += 0.25;
                    if (demoAngle >= 360) demoAngle -= 360;
                    pointerGroup.rotation.y += 0.004;
                    updateHeadingDisplay(demoAngle);
                    if (Math.floor(demoAngle) % 30 === 0) {
                        degreesText.textContent = `${Math.round(demoAngle)}°`;
                    }
                }

                // Renderizar cena principal
                renderer.render(scene, camera);

                // Animar cubo decorativo
                const t = timestamp * 0.001;
                cubeMesh.rotation.x += 0.008;
                cubeMesh.rotation.y += 0.012;
                cubeMesh.rotation.z += 0.005;
                orbitParticles.rotation.y += 0.015;
                orbitParticles.rotation.x += 0.008;
                // Pequena oscilação na escala do cubo
                const scalePulse = 1 + Math.sin(t * 1.8) * 0.04;
                cubeMesh.scale.setScalar(scalePulse);
                cubeRenderer.render(cubeScene, cubeCamera);
            }

            // ============ EVENT LISTENERS ============
            permissionBtn.addEventListener('click', (e) => {
                e.preventDefault();
                requestSensorPermission();
            });
            permissionBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                requestSensorPermission();
            });

            // Responsividade
            function handleResize() {
                const w = window.innerWidth;
                const h = window.innerHeight;
                renderer.setSize(w, h);
                camera.aspect = w / h;
                camera.updateProjectionMatrix();

                // Ajustar câmera para mobile
                if (w < 600) {
                    camera.position.set(0, 7.5, 13);
                    camera.lookAt(0, 0.3, 0);
                } else if (w < 1024) {
                    camera.position.set(0, 7, 12);
                    camera.lookAt(0, 0.3, 0);
                } else {
                    camera.position.set(0, 6.5, 11.5);
                    camera.lookAt(0, 0.3, 0);
                }

                // Redimensionar cubo
                const cubeSize = w < 600 ? 46 : w < 1024 ? 56 : 68;
                cubeContainer.style.width = cubeSize + 'px';
                cubeContainer.style.height = cubeSize + 'px';
                cubeRenderer.setSize(cubeSize, cubeSize);
            }

            window.addEventListener('resize', handleResize);
            window.addEventListener('orientationchange', () => {
                setTimeout(handleResize, 300);
            });

            // ============ INICIALIZAÇÃO ============
            handleResize();
            updateHeadingDisplay(0);

            // Verificar suporte a sensores
            window.addEventListener('load', () => {
                if (!('DeviceOrientationEvent' in window)) {
                    showSensorFallback('Sensores não disponíveis.');
                }
            });

            // Iniciar animação
            requestAnimationFrame(animate);

            // ============ EXPOR PARA DEBUG (OPCIONAL) ============
            console.log('🧭 Bússola 3D Premium inicializada com sucesso.');
            console.log('🌍 Modo:', isSensorActive ? 'Sensores ativos' : 'Demonstração');
            console.log('💡 Dica: Toque em "ATIVAR SENSORES" para usar a bússola real do dispositivo.');
        })();
    </script>
</body>
</html>
