<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mapa, Rota e Satélite - Amigo Severino</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #0c0c14;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        /* Painel Superior Organizador */
        #painel-superior {
            background: rgba(20, 20, 30, 0.95);
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            padding: 10px 14px;
            color: #fff;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 10;
        }
        .linha-painel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        #texto-endereco {
            color: #00ff88;
            font-size: 0.85rem;
            font-weight: 500;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 65%;
        }
        /* Botão de Salvar Rota */
        .btn-salvar {
            background: #f5a623 !important;
            color: #000 !important;
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.75rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(245, 166, 35, 0.3);
        }
        .btn-salvar:active {
            transform: scale(0.95);
        }
        /* Espaço do Mapa */
        #mapa {
            width: 100%;
            flex: 1;
            z-index: 1;
        }
        /* Botão Flutuante de Alternar Camada (Satélite/Ruas) */
        .btn-satelite {
            position: absolute;
            top: 80px;
            right: 10px;
            z-index: 100;
            background: rgba(20, 20, 30, 0.9);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .btn-satelite:active {
            background: #1c1c24;
        }
        /* Marcador de GPS Estilo Navegador */
        .marcador-gps {
            background: #e0243f;
            border: 2px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 12px #e0243f;
        }
    </style>
</head>
<body>

    <div id="painel-superior">
        <div class="linha-painel">
            <span id="texto-endereco">📍 Buscando localização...</span>
            <button class="btn-salvar" onclick="salvarRotaAtual()">💾 Salvar Rota</button>
        </div>
    </div>

    <button class="btn-satelite" onclick="alternarCamadaMapa()">🚀 <span id="txt-btn-satelite">Modo Satélite</span></button>

    <div id="mapa"></div>

    <script>
        // Configura as duas camadas de mapa (Ruas comuns e Imagens de Satélite da Esri)
        const camadaRuas = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        });

        const camadaSatelite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 19,
            attribution: 'Tiles © Esri'
        });

        // Inicializa o mapa com a camada de ruas ativa
        const mapa = L.map('mapa', { 
            zoomControl: false,
            layers: [camadaRuas]
        }).setView([-15.7801, -47.9292], 4);
        
        L.control.zoom({ position: 'bottomright' }).addTo(mapa);

        let mapaEmModoSatelite = false;
        let marcadorUsuario = null;
        let historicoCoordenadas = []; // Guarda os pontos para traçar a linha e salvar a rota
        let linhaTrajeto = null; // Desenho da linha azul na tela

        // Alternador de visualização (Ruas <=> Satélite)
        function alternarCamadaMapa() {
            if (mapaEmModoSatelite) {
                mapa.removeLayer(camadaSatelite);
                mapa.addLayer(camadaRuas);
                document.getElementById('txt-btn-satelite').innerText = "Modo Satélite";
                mapaEmModoSatelite = false;
            } else {
                mapa.removeLayer(camadaRuas);
                mapa.addLayer(camadaSatelite);
                document.getElementById('txt-btn-satelite').innerText = "Modo Ruas";
                mapaEmModoSatelite = true;
            }
        }

        // Busca o nome da rua pela internet
        async function buscarEndereco(lat, lon) {
            try {
                const resposta = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`);
                const dados = await resposta.json();
                if (dados && dados.display_name) {
                    document.getElementById('texto-endereco').innerText = "📍 " + dados.display_name.split(',').slice(0, 3).join(',');
                }
            } catch (erro) {
                document.getElementById('texto-endereco').innerText = "📍 Endereço indisponível";
            }
        }

        // Função executada a cada movimento do veículo pelo GPS
        function localizacaoSucesso(posicao) {
            const lat = posicao.coords.latitude;
            const lon = posicao.coords.longitude;
            const novoPonto = [lat, lon];

            // Adiciona a posição atual no histórico da rota
            historicoCoordenadas.push(novoPonto);

            // Desenha ou atualiza a linha azul do trajeto na tela
            if (!linhaTrajeto) {
                linhaTrajeto = L.polyline(historicoCoordenadas, {
                    color: '#007744', // Mesma cor do botão do mapa pra combinar
                    weight: 5,
                    opacity: 0.85,
                    lineCap: 'round'
                }).addTo(mapa);
            } else {
                linhaTrajeto.setLatLngs(historicoCoordenadas);
            }

            // Move ou cria a bolinha do veículo
            if (!marcadorUsuario) {
                mapa.setView(novoPonto, 16);
                marcadorUsuario = L.circleMarker(novoPonto, {
                    radius: 9,
                    className: 'marcador-gps',
                    fillColor: '#e0243f',
                    fillOpacity: 1,
                    color: '#fff',
                    weight: 2
                }).addTo(mapa);
                
                buscarEndereco(lat, lon);
            } else {
                marcadorUsuario.setLatLng(novoPonto);
            }
        }

        function localizacaoErro(erro) {
            document.getElementById('texto-endereco').innerText = "⚠ Erro de conexão com GPS";
        }

        // Salvar Rota Localmente no dispositivo
        function salvarRotaAtual() {
            if (historicoCoordenadas.length < 2) {
                alert("🚗 Nenhuma movimentação registrada para salvar uma rota ainda!");
                return;
            }

            // Cria um objeto com data e a lista de coordenadas
            const dadosDaRota = {
                data: new Date().toLocaleString('pt-BR'),
                pontos: historicoCoordenadas
            };

            // Busca as rotas antigas salvas e adiciona a nova na lista
            let rotasSalvas = JSON.parse(localStorage.getItem('severino_rotas_salvas')) || [];
            rotasSalvas.push(dadosDaRota);

            // Grava de volta na memória do celular do usuário
            localStorage.setItem('severino_rotas_salvas', JSON.stringify(rotasSalvas));

            alert(`✅ Sucesso! Rota de ${historicoCoordenadas.length} pontos guardada no Amigo Severino.`);
        }

        // Ativa o GPS em tempo real na tela do mapa
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(localizacaoSucesso, localizacaoErro, {
                enableHighAccuracy: true,
                maximumAge: 2000, // Atualiza mais rápido (2 segundos) para o traçado ficar perfeito
                timeout: 6000
            });
        } else {
            document.getElementById('texto-endereco').innerText = "GPS Indisponível";
        }
    </script>
</body>
</html>
