<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>AutoVelox Pro – Velocímetro Profissional</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
:root {
--bg-deep: #06060c;
--card-bg: rgba(18, 18, 28, 0.92);
--border-subtle: rgba(255, 255, 255, 0.1);
--accent-red: #e0243f;
--accent-amber: #f5a623;
--accent-green: #00ff88;
--font-digital: 'Orbitron', 'Segoe UI', monospace;
--font-ui: 'Inter', 'Segoe UI', 'Roboto', sans-serif;
}
* {
box-sizing: border-box;
margin: 0;
padding: 0;
}
body {
font-family: var(--font-ui);
background: radial-gradient(ellipse at 50% 20%, #0f0f1a 0%, #030308 100%);
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: space-between;
padding: 12px 6px 24px 6px;
overflow-x: hidden;
position: relative;
-webkit-tap-highlight-color: transparent;
user-select: none;
transition: background 0.4s ease;
}

/* ========== PÁGINAS ========== */
.pagina {
width: 100%;
display: flex;
flex-direction: column;
align-items: center;
gap: 12px;
}
.pagina.oculta {
display: none !important;
}

/* ========== CABEÇALHO ========== */
.app-header {
width: 100%;
display: flex;
flex-direction: column;
align-items: center;
gap: 4px;
padding: 8px 16px;
margin-bottom: 12px;
background: rgba(22, 22, 34, 0.75);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
border-radius: 18px;
border: 1px solid rgba(255, 255, 255, 0.08);
box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
z-index: 10;
transition: background 0.3s, border-color 0.3s;
}
.header-top-row {
display: flex;
width: 100%;
justify-content: space-between;
align-items: center;
}
.app-logo {
display: flex;
align-items: center;
gap: 6px;
font-family: var(--font-digital);
font-weight: 500;
font-size: 0.85rem;
color: rgba(255, 255, 255, 0.6);
letter-spacing: 0.5px;
}
.app-logo .dot {
width: 6px;
height: 6px;
border-radius: 50%;
background: var(--accent-red);
box-shadow: 0 0 8px var(--accent-red);
}
.digital-clock {
font-family: var(--font-digital);
font-size: 1.8rem;
color: #ffffff;
font-weight: 900;
letter-spacing: 2px;
text-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
background: rgba(0, 0, 0, 0.5);
width: 100%;
text-align: center;
padding: 4px 0;
border-radius: 12px;
border: 1px solid rgba(255, 255, 255, 0.06);
margin-top: 2px;
transition: color 0.3s, background 0.3s, border-color 0.3s, text-shadow 0.3s;
}
.app-badge {
background: rgba(0, 255, 136, 0.1);
padding: 2px 8px;
border-radius: 6px;
font-size: 0.6rem;
letter-spacing: 1.5px;
color: var(--accent-green);
font-weight: 700;
text-transform: uppercase;
}

/* ========== NAVEGAÇÃO ENTRE PÁGINAS ========== */
.nav-tabs {
display: flex;
width: 100%;
gap: 8px;
margin-bottom: 8px;
}
.nav-tab {
flex: 1;
padding: 10px;
background: rgba(255, 255, 255, 0.05);
border: 1px solid rgba(255, 255, 255, 0.1);
border-radius: 12px;
color: #aaa;
font-family: var(--font-digital);
font-weight: 700;
font-size: 0.75rem;
text-align: center;
cursor: pointer;
transition: all 0.3s;
text-transform: uppercase;
letter-spacing: 1px;
}
.nav-tab.ativo {
background: rgba(0, 255, 136, 0.15);
border-color: var(--accent-green);
color: var(--accent-green);
box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
}

/* ========== HUD PRINCIPAL ========== */
.hud-container {
width: 100%;
background: var(--card-bg);
backdrop-filter: blur(24px);
-webkit-backdrop-filter: blur(24px);
padding: 14px 12px;
border-radius: 24px;
box-shadow: 0 28px 60px rgba(0, 0, 0, 0.8);
border: 1px solid var(--border-subtle);
position: relative;
z-index: 1;
flex: 1;
display: flex;
flex-direction: column;
justify-content: space-between;
transition: background 0.3s, border-color 0.3s;
}
.speed-stage {
width: 100%;
height: 44vh;
max-height: 500px;
min-height: 340px;
border-radius: 20px;
background: rgba(10, 10, 18, 0.85);
border: 2px solid rgba(255, 255, 255, 0.05);
box-shadow: inset 0 4px 24px rgba(0, 0, 0, 0.95);
margin-bottom: 12px;
overflow: hidden;
position: relative;
display: flex;
flex-direction: column;
align-items: center;
transition: background 0.3s, border-color 0.3s;
}
#panel-digital {
display: flex;
flex-direction: column;
align-items: center;
justify-content: space-between;
width: 100%;
height: 100%;
z-index: 2;
position: absolute;
padding: 10px 0;
}
.speed-number-container {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
width: 94% !important; 
height: 100% !important; 
flex: 1;
background: rgba(0, 0, 0, 0.6);
border: 1.5px solid #ffffff;
border-radius: 16px;
box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.1), 0 8px 25px rgba(0, 0, 0, 0.5);
margin-top: 2px;
margin-bottom: 6px;
padding: 0;
transition: background 0.3s, border-color 0.3s;
overflow: hidden;
position: relative;
}
.speed-number {
font-family: var(--font-ui);
font-weight: 600;
font-size: 15rem; 
color: #00ff88;
line-height: 1.0;
letter-spacing: -4px;
transition: color 0.3s, font-size 0.1s ease;
display: flex !important;
align-items: center !important;
justify-content: center !important;
text-align: center !important;
position: absolute !important; 
top: 44% !important;
left: 50% !important;
transform: translate(-50%, -50%) !important; 
width: 100% !important;
height: auto !important;
margin: 0 auto !important;
}
.speed-unit {
font-family: var(--font-digital);
font-size: clamp(0.9rem, 2.5vw, 1.2rem);
letter-spacing: 6px;
color: rgba(255, 255, 255, 0.4);
text-transform: uppercase;
font-weight: 700;
position: absolute;
bottom: 8px;
text-align: center;
width: 100%;
z-index: 5;
pointer-events: none;
}
#panel-analog {
display: flex;
flex-direction: column;
width: 100%;
height: 100%;
align-items: center;
justify-content: center;
z-index: 2;
position: absolute;
}
.canvas-container {
flex: 1;
display: flex;
align-items: center;
justify-content: center;
position: relative;
width: 100%;
height: 100%;
margin-bottom: 50px;
}
canvas {
display: block;
width: auto;
height: auto;
max-width: 100%;
max-height: 100%;
border-radius: 50%;
}
.escondido {
display: none !important;
}

/* ========== BARRA DE ROLAGEM (FITA) ========== */
.speed-tape-container {
width: 100%;
height: 52px;
background: linear-gradient(180deg, #f4f4f4 0%, #ffffff 20%, #ffffff 80%, #e0e0e0 100%);
border-top: 2px solid #ccc;
border-bottom: 2px solid #aaa;
box-shadow: inset 0 3px 8px rgba(0,0,0,0.25), 0 6px 12px rgba(0,0,0,0.4);
border-radius: 14px;
position: relative;
overflow: hidden;
display: flex;
align-items: center;
margin-top: auto;
z-index: 3;
transition: background 0.3s, border-color 0.3s;
}
#tape-analog {
position: absolute;
bottom: 10px;
width: 94%;
left: 3%;
}
.speed-tape-container::before {
content: '';
position: absolute;
left: 0;
top: 10px;
width: 100%;
height: 24px;
background: linear-gradient(180deg,
rgba(0, 180, 90, 0.3) 0%,
rgba(0, 255, 136, 0.5) 50%,
rgba(0, 180, 90, 0.3) 100%);
border-top: 2px solid rgba(0, 255, 136, 0.8);
border-bottom: 2px solid rgba(0, 150, 80, 0.7);
box-shadow: inset 0 0 10px rgba(0,255,136,0.5), 0 2px 6px rgba(0,0,0,0.2);
z-index: 1;
pointer-events: none;
}
.speed-tape-track {
display: flex;
position: absolute;
height: 100%;
align-items: center;
left: 50%;
margin-left: -30px; 
transform: translateX(0px);
will-change: transform;
z-index: 2;
}
.tape-mark {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
width: 60px;
height: 100%;
flex-shrink: 0;
position: relative;
}
.tape-number {
font-family: var(--font-ui);
font-size: 1.15rem;
color: #222;
font-weight: 700;
text-shadow: 0 1px 2px rgba(255,255,255,0.9), 0 -1px 0 rgba(0,0,0,0.3);
}
.tape-tick {
width: 2px;
height: 12px;
background: #333;
margin-top: 2px;
box-shadow: 0 1px 2px rgba(255,255,255,0.7);
}
.tape-minor-tick {
width: 2px;
height: 7px;
background: #666;
margin-top: 2px;
box-shadow: 0 1px 1px rgba(255,255,255,0.5);
}
.tape-minor-number {
font-family: var(--font-ui);
font-size: 0.78rem;
color: #444;
text-shadow: 0 1px 1px rgba(255,255,255,0.8);
}
.tape-pointer {
position: absolute;
left: 50%;
top: 0;
width: 6px;
height: 100%;
background: linear-gradient(90deg, #b01020, #ff2a40, #b01020);
box-shadow: 0 0 14px rgba(255, 0, 0, 0.8), inset 0 0 5px rgba(255,255,255,0.4);
transform: translateX(-50%);
z-index: 4;
border-radius: 3px;
}
.progress-container {
width: 100%;
height: 6px;
background: #12121c;
border-radius: 20px;
margin: 0 0 10px;
overflow: hidden;
box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.8);
transition: background 0.3s;
}
.progress-bar {
height: 100%;
width: 0%;
background: linear-gradient(90deg, #4a90d9, #e0243f);
border-radius: 20px;
}
.gps-warning {
text-align: center;
color: var(--accent-amber);
font-size: 0.75rem;
margin-bottom: 8px;
display: none;
font-weight: 500;
}
.grid {
display: grid;
grid-template-columns: 1fr 1fr 1fr;
gap: 10px;
margin: 2px 0 12px;
width: 100%;
}
.card {
background: rgba(255, 255, 255, 0.03);
backdrop-filter: blur(12px);
-webkit-backdrop-filter: blur(12px);
padding: 10px 2px;
border-radius: 12px;
border: 1px solid rgba(255, 255, 255, 0.06);
text-align: center;
box-shadow: 0 4px 15px rgba(0,0,0,0.3);
transition: background 0.3s, border-color 0.3s;
display: flex;
flex-direction: column;
justify-content: center;
}
.card span {
display: block;
font-weight: 700;
font-size: 1.15rem;
color: #ffffff;
margin-top: 4px;
font-family: var(--font-digital);
letter-spacing: 0.5px;
transition: color 0.3s;
}
.card label {
font-size: 0.58rem;
letter-spacing: 1.5px;
color: #888;
text-transform: uppercase;
font-weight: 700;
transition: color 0.3s;
}
.theme-toggle-btn {
background: rgba(255,255,255,0.1);
border: 1px solid rgba(255,255,255,0.25);
border-radius: 50%;
width: 28px;
height: 28px;
font-size: 14px;
cursor: pointer;
color: #fff;
display: flex;
align-items: center;
justify-content: center;
margin: 4px auto 0;
transition: background 0.3s, color 0.3s, border-color 0.3s;
padding: 0;
}
.caixa-botoes-rodape {
display: flex !important;
flex-direction: row !important;
justify-content: space-between !important;
gap: 12px !important;
width: 100% !important;
max-width: 100% !important;
padding: 0 4px !important;
box-sizing: border-box !important;
margin-top: 4px !important;
}
.btn-rodape-acao {
flex: 1 !important;
width: 50% !important;
padding: 16px 4px !important;
border-radius: 40px !important;
font-family: var(--font-digital) !important;
font-weight: 700 !important;
text-transform: uppercase !important;
letter-spacing: 1.5px !important;
font-size: 0.78rem !important;
cursor: pointer !important;
text-align: center !important;
box-shadow: 0 6px 20px rgba(0,0,0,0.4) !important;
transition: background 0.3s, color 0.3s, border-color 0.3s, transform(0.1s) !important;
box-sizing: border-box !important;
}
.btn-rodape-acao:active {
transform: scale(0.96) !important;
}
.btn-rodape-vermelho {
background: #c91a30 !important;
color: #ffffff !important;
border: 1px solid rgba(255, 255, 255, 0.15) !important;
}
.btn-rodape-vermelho:active {
background: #a01424 !important;
}
.btn-rodape-escuro {
background: #14141a !important;
color: rgba(255, 255, 255, 0.9) !important;
border: 1px solid rgba(255, 255, 255, 0.12) !important;
}
.btn-rodape-escuro:active {
background: #1c1c24 !important;
}

/* ========== PÁGINA DO MAPA ========== */
.mapa-container {
width: 100%;
flex: 1;
min-height: 60vh;
border-radius: 20px;
overflow: hidden;
border: 2px solid rgba(255, 255, 255, 0.1);
box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
position: relative;
z-index: 1;
}
#mapaLeaflet {
width: 100%;
height: 100%;
min-height: 60vh;
background: #1a1a2e;
}
.mapa-controles {
display: flex;
gap: 10px;
width: 100%;
margin-top: 12px;
flex-wrap: wrap;
}
.btn-mapa {
flex: 1;
min-width: 100px;
padding: 12px 8px;
border-radius: 12px;
font-family: var(--font-digital);
font-weight: 700;
font-size: 0.7rem;
text-transform: uppercase;
letter-spacing: 1px;
cursor: pointer;
border: 1px solid rgba(255, 255, 255, 0.15);
color: #fff;
background: rgba(20, 20, 30, 0.9);
backdrop-filter: blur(10px);
transition: all 0.3s;
text-align: center;
}
.btn-mapa:active {
transform: scale(0.96);
}
.btn-mapa.iniciar {
background: rgba(0, 200, 100, 0.2);
border-color: #00ff88;
color: #00ff88;
}
.btn-mapa.parar {
background: rgba(200, 30, 50, 0.2);
border-color: #e0243f;
color: #e0243f;
}
.btn-mapa.salvar {
background: rgba(245, 166, 35, 0.2);
border-color: #f5a623;
color: #f5a623;
}
.lista-trechos {
width: 100%;
max-height: 200px;
overflow-y: auto;
margin-top: 12px;
background: rgba(20, 20, 30, 0.8);
border-radius: 16px;
padding: 12px;
border: 1px solid rgba(255, 255, 255, 0.08);
}
.lista-trechos h3 {
color: #aaa;
font-size: 0.7rem;
text-transform: uppercase;
letter-spacing: 1.5px;
margin-bottom: 8px;
font-family: var(--font-digital);
}
.trecho-item {
display: flex;
justify-content: space-between;
align-items: center;
padding: 10px;
background: rgba(255, 255, 255, 0.03);
border-radius: 8px;
margin-bottom: 6px;
color: #ccc;
font-size: 0.75rem;
border: 1px solid rgba(255, 255, 255, 0.05);
}
.trecho-item button {
background: rgba(200, 30, 50, 0.3);
border: none;
color: #ff6b6b;
padding: 4px 10px;
border-radius: 6px;
cursor: pointer;
font-size: 0.65rem;
font-weight: 700;
}

/* ========== TEMA INVERSO ========== */
body.light-mode {
background: radial-gradient(ellipse at 50% 20%, #e8eaed 0%, #f5f7fa 100%);
}
body.light-mode .app-header {
background: rgba(255, 255, 255, 0.9);
border-color: #cccccc;
box-shadow: 0 8px 24px rgba(0,0,0,0.1);
}
body.light-mode .app-logo {
color: rgba(0,0,0,0.6);
}
body.light-mode .digital-clock {
color: #1a1a1a;
background: rgba(0,0,0,0.03);
border-color: #cccccc;
text-shadow: 0 0 8px rgba(0,180,90,0.3);
}
body.light-mode .hud-container {
background: rgba(255, 255, 255, 0.95);
border-color: #cccccc;
box-shadow: 0 28px 60px rgba(0,0,0,0.15);
}
body.light-mode .speed-stage {
background: rgba(240, 240, 245, 0.9);
border-color: #cccccc;
box-shadow: inset 0 4px 24px rgba(0,0,0,0.1);
}
body.light-mode .speed-number-container {
background: rgba(255,255,255,0.85);
border-color: #444444;
box-shadow: inset 0 0 15px rgba(0,0,0,0.1), 0 8px 25px rgba(0,0,0,0.2);
}
body.light-mode .speed-number {
color: #007744;
}
body.light-mode .speed-unit {
color: rgba(0,0,0,0.5);
}
body.light-mode .card {
background: rgba(0,0,0,0.03);
border-color: #cccccc;
box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}
body.light-mode .card label {
color: #555555;
}
body.light-mode .card span {
color: #111111;
}
body.light-mode .theme-toggle-btn {
background: rgba(0,0,0,0.05);
border-color: #999999;
color: #333333;
}
body.light-mode .progress-container {
background: #dddddd;
}
body.light-mode .speed-tape-container {
background: linear-gradient(180deg, #eaeaea 0%, #ffffff 20%, #ffffff 80%, #dcdcdc 100%);
border-top-color: #bbbbbb;
border-bottom-color: #999999;
}
body.light-mode .tape-number,
body.light-mode .tape-minor-number {
color: #111;
text-shadow: 0 1px 2px rgba(255,255,255,0.9);
}
body.light-mode .tape-tick {
background: #222;
}
body.light-mode .tape-minor-tick {
background: #555;
}
body.light-mode .tape-pointer {
background: linear-gradient(90deg, #b01020, #ff2a40, #b01020);
}
body.light-mode .btn-rodape-escuro {
background: #e0e0e0 !important;
color: #111111 !important;
border-color: #aaaaaa !important;
}
body.light-mode .nav-tab {
background: rgba(0,0,0,0.05);
border-color: #ccc;
color: #555;
}
body.light-mode .nav-tab.ativo {
background: rgba(0, 180, 90, 0.15);
border-color: #007744;
color: #007744;
}
body.light-mode .mapa-container {
border-color: #ccc;
}
body.light-mode .btn-mapa {
background: rgba(240, 240, 245, 0.9);
color: #333;
border-color: #ccc;
}
body.light-mode .lista-trechos {
background: rgba(255, 255, 255, 0.8);
border-color: #ddd;
}
body.light-mode .lista-trechos h3 {
color: #555;
}
body.light-mode .trecho-item {
background: rgba(0,0,0,0.03);
color: #333;
border-color: #ddd;
}

@media (max-width: 600px) {
.speed-stage {
height: 44vh;
}
}
</style>
</head>
<body>

<!-- ==================== PÁGINA 1: VELOCÍMETRO ==================== -->
<div class="pagina" id="paginaVelocimetro">
<div class="app-header">
<div class="header-top-row">
<div class="app-logo">
<span class="dot"></span>SEVERINO-LC
</div>
<div class="app-badge">PRO</div>
</div>
<div class="digital-clock" id="topClock">00:00:00</div>
</div>

<div class="nav-tabs">
<div class="nav-tab ativo" onclick="mostrarPagina('velocimetro')">🏁 Velocímetro</div>
<div class="nav-tab" onclick="mostrarPagina('mapa')">🗺️ Mapa & Rotas</div>
</div>

<div class="hud-container">
<div class="speed-stage" id="speedStage">
<div id="panel-digital">
<div class="speed-number-container">
<div class="speed-number" id="speed-val">00</div>
<div class="speed-unit">km/h</div>
</div>
<div class="speed-tape-container" id="tape-digital">
<div class="tape-pointer"></div>
<div class="speed-tape-track" id="tape-track-digital"></div>
</div>
</div>
<div id="panel-analog" class="escondido">
<div class="canvas-container">
<canvas id="gaugeCanvas" width="500" height="500" aria-label="Velocímetro analógico"></canvas>
</div>
<div class="speed-tape-container" id="tape-analog">
<div class="tape-pointer"></div>
<div class="speed-tape-track" id="tape-track-analog"></div>
</div>
</div>
</div>
<div class="gps-warning" id="gpsWarning">🔍 Buscando sinal GPS...</div>
<div class="progress-container">
<div class="progress-bar" id="p-bar"></div>
</div>
<div class="grid">
<div class="card"><label>Distância</label><span id="dist-val">0.00 km</span></div>
<div class="card"><label>Média</label><span id="avg-val">0.0</span></div>
<div class="card" style="flex-direction: row; align-items: center; justify-content: center; gap: 8px; padding: 8px 4px;">
<div style="text-align: center;">
<label>Rumo</label>
<span id="dir-val">-</span>
</div>
<button id="themeToggleBtn" class="theme-toggle-btn" aria-label="Alternar tema">🌙</button>
</div>
</div>
<div class="caixa-botoes-rodape">
<button class="btn-rodape-acao btn-rodape-vermelho" onclick="window.zerarHodometro()">Zerar Dist.</button>
<button class="btn-rodape-acao btn-rodape-escuro" onclick="switchPanel()">Alternar Painel</button>
</div>
</div>
</div>

<!-- ==================== PÁGINA 2: MAPA E ROTAS ==================== -->
<div class="pagina oculta" id="paginaMapa">
<div class="app-header">
<div class="header-top-row">
<div class="app-logo">
<span class="dot"></span>SEVERINO-LC
</div>
<div class="app-badge">PRO</div>
</div>
<div class="digital-clock" id="topClockMapa">00:00:00</div>
</div>

<div class="nav-tabs">
<div class="nav-tab" onclick="mostrarPagina('velocimetro')">🏁 Velocímetro</div>
<div class="nav-tab ativo" onclick="mostrarPagina('mapa')">🗺️ Mapa & Rotas</div>
</div>

<div class="mapa-container">
<div id="mapaLeaflet"></div>
</div>

<div class="mapa-controles">
<button class="btn-mapa iniciar" id="btnIniciarRota" onclick="iniciarRota()">▶ Iniciar Rota</button>
<button class="btn-mapa parar" id="btnPararRota" onclick="pararRota()" disabled>⏹ Parar Rota</button>
<button class="btn-mapa salvar" id="btnSalvarRota" onclick="salvarRota()" disabled>💾 Salvar Trajeto</button>
</div>

<div class="lista-trechos" id="listaTrechos">
<h3>📋 Trajetos Salvos</h3>
<div id="trechosContainer">Nenhum trajeto salvo ainda.</div>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function() {
// ========== VARIÁVEIS GLOBAIS ==========
let currentMode = "digital";
let totalDistance = parseFloat(localStorage.getItem('severino_distancia')) || 0;
let lastCoord = null;
let gpsErrorCount = 0;
let lastUpdateTime = Date.now();
window.velocidadeAlvoGPS = 0;
let velocidadeSuaveExibida = 0;
let totalSomaVelocidades = 0;
let totalLeiturasGps = 0;
window.isLightMode = false;

// ========== ELEMENTOS DOM VELOCÍMETRO ==========
const speedVal = document.getElementById('speed-val');
const pBar = document.getElementById('p-bar');
const distVal = document.getElementById('dist-val');
const avgVal = document.getElementById('avg-val');
const dirVal = document.getElementById('dir-val');
const canvas = document.getElementById('gaugeCanvas');
const ctx = canvas.getContext('2d');
const gpsWarning = document.getElementById('gpsWarning');
const panelDigital = document.getElementById('panel-digital');
const panelAnalog = document.getElementById('panel-analog');
const speedStage = document.getElementById('speedStage');
const topClock = document.getElementById('topClock');
const topClockMapa = document.getElementById('topClockMapa');
const themeToggleBtn = document.getElementById('themeToggleBtn');
const tapeTrackDigital = document.getElementById('tape-track-digital');
const tapeTrackAnalog = document.getElementById('tape-track-analog');
const tapeMarkWidth = 60;

// ========== ELEMENTOS DOM MAPA ==========
let mapaLeaflet = null;
let marcadorAtual = null;
let polylineAtual = null;
let coordenadasRota = [];
let rotaAtiva = false;
let watchIdGPS = null;

const btnIniciarRota = document.getElementById('btnIniciarRota');
const btnPararRota = document.getElementById('btnPararRota');
const btnSalvarRota = document.getElementById('btnSalvarRota');
const trechosContainer = document.getElementById('trechosContainer');

// ========== INICIALIZAÇÃO ==========
if (distVal) distVal.innerText = (totalDistance / 1000).toFixed(2) + " km";

themeToggleBtn.addEventListener('click', () => {
document.body.classList.toggle('light-mode');
window.isLightMode = document.body.classList.contains('light-mode');
themeToggleBtn.textContent = window.isLightMode ? '☀️' : '🌙';
});

// ========== RELÓGIO ==========
function updateClock() {
const now = new Date();
const timeStr = String(now.getHours()).padStart(2, '0') + ':' +
String(now.getMinutes()).padStart(2, '0') + ':' +
String(now.getSeconds()).padStart(2, '0');
topClock.innerText = timeStr;
if (topClockMapa) topClockMapa.innerText = timeStr;
}
setInterval(updateClock, 1000);
updateClock();

// ========== FITA DE VELOCIDADE ==========
function generateSpeedTape(trackElement) {
if (!trackElement) return;
trackElement.innerHTML = '';
const maxSpeed = 200;
for (let i = 0; i <= maxSpeed; i += 10) {
const mark = document.createElement('div');
mark.className = 'tape-mark';
mark.innerHTML = `<div class="tape-number">${i}</div> <div class="tape-tick"></div>`;
trackElement.appendChild(mark);
if (i < maxSpeed) {
const minorMark = document.createElement('div');
minorMark.className = 'tape-mark';
minorMark.innerHTML = `<div class="tape-minor-number">${i + 5}</div> <div class="tape-minor-tick"></div>`;
trackElement.appendChild(minorMark);
}
}
}
generateSpeedTape(tapeTrackDigital);
generateSpeedTape(tapeTrackAnalog);

// ========== ATUALIZAÇÃO DE VELOCIDADE ==========
window.atualizarVelocidade = function(velocidadeKmh, lat, lon, bearing) {
if (gpsWarning.style.display !== 'none') gpsWarning.style.display = 'none';
gpsErrorCount = 0;
lastUpdateTime = Date.now();
window.velocidadeAlvoGPS = velocidadeKmh > 1.5 ? velocidadeKmh : 0;
if (window.velocidadeAlvoGPS > 0) {
totalSomaVelocidades += window.velocidadeAlvoGPS;
totalLeiturasGps++;
if (avgVal) {
avgVal.innerText = (totalSomaVelocidades / totalLeiturasGps).toFixed(1);
}
}
if (lat && lon && lastCoord && window.velocidadeAlvoGPS > 2.0) {
let d = haversine(lastCoord.lat, lastCoord.lon, lat, lon);
if (d > 0 && d < 500) {
totalDistance += d;
localStorage.setItem('severino_distancia', totalDistance.toString());
}
}
if (lat && lon) lastCoord = { lat, lon };
if (!lat && window.velocidadeAlvoGPS > 0) {
totalDistance += (window.velocidadeAlvoGPS / 3.6);
localStorage.setItem('severino_distancia', totalDistance.toString());
}
if (distVal) distVal.innerText = (totalDistance / 1000).toFixed(2) + " km";
if (dirVal && bearing !== undefined) dirVal.innerText = getCardinals(bearing);

// Atualiza posição no mapa se rota ativa
if (rotaAtiva && lat && lon && mapaLeaflet) {
const novaCoord = [lat, lon];
coordenadasRota.push(novaCoord);
if (marcadorAtual) {
marcadorAtual.setLatLng(novaCoord);
} else {
marcadorAtual = L.marker(novaCoord, {
icon: L.divIcon({
className: 'marcador-gps',
html: '<div style="background:#00ff88;width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 15px #00ff88;"></div>',
iconSize: [14, 14],
iconAnchor: [7, 7]
})
}).addTo(mapaLeaflet);
}
mapaLeaflet.setView(novaCoord, mapaLeaflet.getZoom());
if (polylineAtual) {
polylineAtual.setLatLngs(coordenadasRota);
} else {
polylineAtual = L.polyline(coordenadasRota, {
color: '#00ff88',
weight: 4,
opacity: 0.8
}).addTo(mapaLeaflet);
}
}
};

window.zerarHodometro = function() {
totalDistance = 0;
totalSomaVelocidades = 0;
totalLeiturasGps = 0;
localStorage.setItem('severino_distancia', '0');
if (distVal) distVal.innerText = "0.00 km";
if (avgVal) avgVal.innerText = "0.0";
};

window.switchPanel = function() {
if (currentMode === "digital") {
panelDigital.classList.add('escondido');
panelAnalog.classList.remove('escondido');
currentMode = "analog";
setTimeout(() => { resizeCanvas(); }, 40);
} else {
panelDigital.classList.remove('escondido');
panelAnalog.classList.add('escondido');
currentMode = "digital";
}
};

function resizeCanvas() {
if (!canvas || !speedStage) return;
const rect = canvas.parentNode.getBoundingClientRect();
const size = Math.min(rect.width, rect.height) * 0.99;
canvas.width = size;
canvas.height = size;
}
window.addEventListener('resize', resizeCanvas);

// ========== RENDERIZAÇÃO DO VELOCÍMETRO ==========
function renderizarCicloSuave() {
const agora = Date.now();
const tempoSemGps = agora - lastUpdateTime;
if (tempoSemGps > 1200) {
window.velocidadeAlvoGPS = Math.max(0, window.velocidadeAlvoGPS - 5);
}
const diferenca = window.velocidadeAlvoGPS - velocidadeSuaveExibida;
const absDiferenca = Math.abs(diferenca);
let fatorSuavizacao = diferenca > 0 ? 0.98 : 0.60;
if (absDiferenca > 15) {
fatorSuavizacao = 0.99;
} else if (absDiferenca < 1 && window.velocidadeAlvoGPS === 0) {
fatorSuavizacao = 1.0;
}
velocidadeSuaveExibida += diferenca * fatorSuavizacao;
if (Math.abs(velocidadeSuaveExibida) < 0.1) velocidadeSuaveExibida = 0;
const valorArredondado = Math.round(window.velocidadeAlvoGPS);
if (speedVal) {
speedVal.innerText = valorArredondado.toString().padStart(2, '0');
if (valorArredondado >= 100) {
speedVal.style.fontSize = "10rem";
} else {
speedVal.style.fontSize = "15rem";
}
}
drawGauge(velocidadeSuaveExibida);
const tapeDeslocamento = (velocidadeSuaveExibida / 5) * tapeMarkWidth;
if (tapeTrackDigital) {
tapeTrackDigital.style.transform = `translateX(${-tapeDeslocamento}px)`;
}
if (tapeTrackAnalog) {
tapeTrackAnalog.style.transform = `translateX(${-tapeDeslocamento}px)`;
}
const pct = Math.min((velocidadeSuaveExibida / 200) * 100, 100);
if (pBar) pBar.style.width = pct + "%";
requestAnimationFrame(renderizarCicloSuave);
}

// ========== GPS ==========
function updateGPS(pos) {
let rawSpeed = pos.coords.speed || 0;
if (rawSpeed < 0) rawSpeed = 0;
window.atualizarVelocidade(rawSpeed * 3.6, pos.coords.latitude, pos.coords.longitude, pos.coords.heading);
}
function handleGPSError(err) {
gpsErrorCount++;
if (gpsWarning) {
gpsWarning.style.display = 'block';
gpsWarning.innerText = gpsErrorCount > 3 ? '⚠ Sinal GPS perdido.' : '🔍 Buscando sinal GPS...';
}
if (Date.now() - lastUpdateTime > 15000) {
window.velocidadeAlvoGPS = 0;
}
}
function haversine(lat1, lon1, lat2, lon2) {
const R = 6371000;
const dLat = (lat2 - lat1) * Math.PI / 180;
const dLon = (lon2 - lon1) * Math.PI / 180;
const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}
function getCardinals(deg) {
if (deg === null || isNaN(deg)) return "-";
const sectors = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"];
return sectors[Math.round(deg / 45) % 8];
}

// ========== DESENHO DO VELOCÍMETRO ANALÓGICO ==========
function drawGauge(speed) {
if (!canvas || !ctx) return;
const w = canvas.width;
const w_h = canvas.height;
const cx = w / 2;
const cy = w_h / 2;
const radius = Math.min(w, w_h) * 0.46;
const light = window.isLightMode;
const bgColor = light ? '#f0f2f5' : '#0a0a12';
const outerRingColor = light ? '#333333' : '#00ff88';
const arcBaseColor = light ? '#aaaaaa' : '#ffffff';
const arcProgressStart = light ? '#c91a30' : '#c91a30';
const arcProgressEnd = light ? '#ff3b50' : '#ff3b50';
const tickMajorColor = light ? '#222222' : '#ffffff';
const tickMinorColor = light ? 'rgba(0,0,0,0.5)' : 'rgba(255,255,255,0.4)';
const numberColor = light ? '#005533' : '#00ff88';
const needleColor = light ? '#cc2233' : '#ff3b50';
const centerDotStroke = light ? '#222222' : '#ffffff';
const odoTextColor = light ? '#b37400' : '#f5a623';
const speedTextColor = light ? '#007744' : '#00ff88';
const infoBoxBg = light ? 'rgba(255,255,255,0.9)' : 'rgba(0,0,0,0.92)';
ctx.clearRect(0, 0, w, w_h);
ctx.fillStyle = bgColor;
ctx.beginPath();
ctx.arc(cx, cy, radius + 14, 0, Math.PI * 2);
ctx.fill();
ctx.save();
ctx.shadowBlur = 10;
ctx.shadowColor = light ? 'rgba(0,0,0,0.2)' : 'rgba(255,255,255,0.45)';
ctx.beginPath();
ctx.arc(cx, cy, radius + 14, 0, Math.PI * 2);
ctx.strokeStyle = outerRingColor;
ctx.lineWidth = 2.5;
ctx.stroke();
ctx.restore();
ctx.beginPath();
ctx.arc(cx, cy, radius + 7, 0, Math.PI * 2);
ctx.fillStyle = bgColor;
ctx.fill();
const startAngle = Math.PI * 0.78;
const endAngleTotal = Math.PI * 2.22;
const maxSpeed = 200;
const clampedSpeed = Math.min(speed, maxSpeed);
const progressAngle = startAngle + (clampedSpeed / maxSpeed) * (endAngleTotal - startAngle);
ctx.beginPath();
ctx.arc(cx, cy, radius, startAngle, endAngleTotal);
ctx.strokeStyle = arcBaseColor;
ctx.lineWidth = 12;
ctx.lineCap = 'round';
ctx.stroke();
const arcGrad = ctx.createLinearGradient(0, 0, w, 0);
arcGrad.addColorStop(0, arcProgressStart);
arcGrad.addColorStop(1, arcProgressEnd);
ctx.beginPath();
ctx.arc(cx, cy, radius, startAngle, progressAngle);
ctx.strokeStyle = arcGrad;
ctx.lineWidth = 12;
ctx.lineCap = 'round';
ctx.stroke();
for (let i = 0; i <= maxSpeed; i += 5) {
const angle = startAngle + (i / maxSpeed) * (endAngleTotal - startAngle);
const isMajor = i % 20 === 0;
const tickLength = isMajor ? 14 : 8;
const innerRadius = radius - 6;
ctx.beginPath();
ctx.moveTo(cx + Math.cos(angle) * innerRadius, cy + Math.sin(angle) * innerRadius);
ctx.lineTo(cx + Math.cos(angle) * (innerRadius - tickLength), cy + Math.sin(angle) * (innerRadius - tickLength));
ctx.strokeStyle = isMajor ? tickMajorColor : tickMinorColor;
ctx.lineWidth = isMajor ? 3 : 1;
ctx.stroke();
}
ctx.font = `bold ${Math.floor(radius * 0.13)}px 'Orbitron', sans-serif`;
ctx.fillStyle = numberColor;
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
for (let i = 0; i <= maxSpeed; i += 20) {
const angle = startAngle + (i / maxSpeed) * (endAngleTotal - startAngle);
const numX = cx + Math.cos(angle) * (radius - 32);
const numY = cy + Math.sin(angle) * (radius - 32);
ctx.fillText(i.toString(), numX, numY);
}
ctx.save();
ctx.translate(cx, cy);
ctx.rotate(progressAngle + Math.PI / 2);
ctx.beginPath();
ctx.moveTo(-5, 0);
ctx.lineTo(0, -radius + 15);
ctx.lineTo(5, 0);
ctx.closePath();
ctx.fillStyle = needleColor;
ctx.fill();
ctx.restore();
ctx.beginPath();
ctx.arc(cx, cy, 10, 0, Math.PI * 2);
ctx.fillStyle = bgColor;
ctx.fill();
ctx.strokeStyle = centerDotStroke;
ctx.lineWidth = 2;
ctx.stroke();
const dW = radius * 0.88;
const dH = radius * 0.38;
const dX = cx - dW / 2;
const dY = cy + radius * 0.38;
ctx.fillStyle = infoBoxBg;
ctx.beginPath();
if(ctx.roundRect) ctx.roundRect(dX, dY, dW, dH, 8); else ctx.rect(dX, dY, dW, dH);
ctx.fill();
ctx.font = `bold ${Math.floor(dH * 0.36)}px 'Orbitron', monospace`;
ctx.fillStyle = odoTextColor;
ctx.fillText(`ODO: ${(totalDistance/1000).toFixed(1)} km`, cx, dY + dH * 0.32);
ctx.font = `bold ${Math.floor(dH * 0.52)}px 'Orbitron', monospace`;
ctx.fillStyle = speedTextColor;
ctx.fillText(`${Math.round(speed)} km/h`, cx, dY + dH * 0.76);
}

// ========== NAVEGAÇÃO ENTRE PÁGINAS ==========
window.mostrarPagina = function(pagina) {
const pagVel = document.getElementById('paginaVelocimetro');
const pagMapa = document.getElementById('paginaMapa');
const tabs = document.querySelectorAll('.nav-tab');

if (pagina === 'velocimetro') {
pagVel.classList.remove('oculta');
pagMapa.classList.add('oculta');
tabs[0].classList.add('ativo');
tabs[1].classList.remove('ativo');
if (mapaLeaflet) {
setTimeout(() => { mapaLeaflet.invalidateSize(); }, 300);
}
} else {
pagVel.classList.add('oculta');
pagMapa.classList.remove('oculta');
tabs[0].classList.remove('ativo');
tabs[1].classList.add('ativo');
if (!mapaLeaflet) {
inicializarMapa();
} else {
setTimeout(() => { mapaLeaflet.invalidateSize(); }, 300);
}
}
};

// ========== INICIALIZAÇÃO DO MAPA ==========
function inicializarMapa() {
mapaLeaflet = L.map('mapaLeaflet', {
attributionControl: false,
zoomControl: true
}).setView([-15.7801, -47.9292], 13); // Brasília como padrão

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
maxZoom: 19,
}).addTo(mapaLeaflet);

L.control.attribution({
position: 'bottomright',
prefix: '© OpenStreetMap'
}).addTo(mapaLeaflet);

carregarTrechosSalvos();
}

// ========== CONTROLE DE ROTA ==========
window.iniciarRota = function() {
if (!mapaLeaflet) inicializarMapa();
rotaAtiva = true;
coordenadasRota = [];
if (polylineAtual) {
mapaLeaflet.removeLayer(polylineAtual);
polylineAtual = null;
}
if (marcadorAtual) {
mapaLeaflet.removeLayer(marcadorAtual);
marcadorAtual = null;
}
btnIniciarRota.disabled = true;
btnPararRota.disabled = false;
btnSalvarRota.disabled = true;

// Centraliza na posição atual
if (lastCoord) {
mapaLeaflet.setView([lastCoord.lat, lastCoord.lon], 16);
}
};

window.pararRota = function() {
rotaAtiva = false;
btnIniciarRota.disabled = false;
btnPararRota.disabled = true;
btnSalvarRota.disabled = false;
};

window.salvarRota = function() {
if (coordenadasRota.length < 2) {
alert('Trajeto muito curto para salvar!');
return;
}
const trechos = JSON.parse(localStorage.getItem('severino_trechos') || '[]');
const novoTrecho = {
id: Date.now(),
data: new Date().toLocaleString(),
coordenadas: coordenadasRota,
distancia: calcularDistanciaRota(coordenadasRota)
};
trechos.push(novoTrecho);
localStorage.setItem('severino_trechos', JSON.stringify(trechos));
coordenadasRota = [];
if (polylineAtual) {
mapaLeaflet.removeLayer(polylineAtual);
polylineAtual = null;
}
if (marcadorAtual) {
mapaLeaflet.removeLayer(marcadorAtual);
marcadorAtual = null;
}
btnSalvarRota.disabled = true;
btnIniciarRota.disabled = false;
btnPararRota.disabled = true;
carregarTrechosSalvos();
};

function calcularDistanciaRota(coords) {
let dist = 0;
for (let i = 1; i < coords.length; i++) {
dist += haversine(coords[i-1][0], coords[i-1][1], coords[i][0], coords[i][1]);
}
return (dist / 1000).toFixed(2);
}

function carregarTrechosSalvos() {
if (!trechosContainer) return;
const trechos = JSON.parse(localStorage.getItem('severino_trechos') || '[]');
if (trechos.length === 0) {
trechosContainer.innerHTML = 'Nenhum trajeto salvo ainda.';
return;
}
let html = '';
trechos.forEach((t, index) => {
html += `
<div class="trecho-item">
<span>📅 ${t.data} | 📏 ${t.distancia} km</span>
<div>
<button onclick="visualizarTrecho(${index})">👁 Ver</button>
<button onclick="excluirTrecho(${index})">🗑 Excluir</button>
</div>
</div>`;
});
trechosContainer.innerHTML = html;
}

window.visualizarTrecho = function(index) {
if (!mapaLeaflet) inicializarMapa();
const trechos = JSON.parse(localStorage.getItem('severino_trechos') || '[]');
if (!trechos[index]) return;
const t = trechos[index];
mostrarPagina('mapa');
if (polylineAtual) mapaLeaflet.removeLayer(polylineAtual);
if (marcadorAtual) mapaLeaflet.removeLayer(marcadorAtual);
polylineAtual = L.polyline(t.coordenadas, {
color: '#f5a623',
weight: 5,
opacity: 0.9
}).addTo(mapaLeaflet);
mapaLeaflet.fitBounds(polylineAtual.getBounds());
};

window.excluirTrecho = function(index) {
if (!confirm('Excluir este trajeto?')) return;
const trechos = JSON.parse(localStorage.getItem('severino_trechos') || '[]');
trechos.splice(index, 1);
localStorage.setItem('severino_trechos', JSON.stringify(trechos));
carregarTrechosSalvos();
if (polylineAtual) {
mapaLeaflet.removeLayer(polylineAtual);
polylineAtual = null;
}
};

// ========== INICIALIZAÇÃO DO GPS ==========
if ("geolocation" in navigator) {
navigator.geolocation.watchPosition(updateGPS, handleGPSError, {
enableHighAccuracy: true,
maximumAge: 0,
timeout: 4000
});
}
resizeCanvas();
renderizarCicloSuave();
})();
</script>
</body>
</html>
